<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — SMS Sorocaba</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:2rem}
.logo-title{font-size:18px;font-weight:700;color:#1a1a18;margin-bottom:4px}
.logo-sub{font-size:13px;color:#9b9a96}
.form-group{margin-bottom:1rem}
.form-label{font-size:12px;font-weight:500;color:#5f5e5a;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.form-input{width:100%;font-size:14px;padding:10px 12px;border:1px solid #e0ddd5;border-radius:8px;background:#fff;color:#1a1a18;transition:border-color .15s}
.form-input:focus{outline:none;border-color:#378ADD}
.btn{width:100%;font-size:14px;font-weight:500;padding:11px;border-radius:8px;border:none;background:#378ADD;color:#fff;cursor:pointer;margin-top:.5rem;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:#f0efea;color:#5f5e5a;margin-top:.5rem}
.btn-sec:hover{background:#e0ddd5}
.error{font-size:13px;color:#E24B4A;background:#FCEBEB;border-radius:6px;padding:8px 12px;margin-top:.75rem;display:none}
.success{font-size:13px;color:#085041;background:#E1F5EE;border-radius:6px;padding:8px 12px;margin-top:.75rem;display:none}
.footer{text-align:center;font-size:12px;color:#9b9a96;margin-top:1.5rem}
.info{font-size:12px;color:#9b9a96;background:#f5f5f3;border-radius:6px;padding:8px 12px;margin-bottom:1rem;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-title">SMS Sorocaba</div>
    <div class="logo-sub">Criar conta de acesso</div>
  </div>

  <div class="info">ℹ️ Novas contas começam como <strong>Visualizador</strong>. Um administrador pode alterar suas permissões.</div>

  <div class="form-group">
    <label class="form-label">Nome completo</label>
    <input type="text" class="form-input" id="nome" placeholder="Seu nome">
  </div>
  <div class="form-group">
    <label class="form-label">E-mail</label>
    <input type="email" class="form-input" id="email" placeholder="seu@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Senha</label>
    <input type="password" class="form-input" id="senha" placeholder="Mínimo 6 caracteres">
  </div>
  <div class="form-group">
    <label class="form-label">Confirmar senha</label>
    <input type="password" class="form-input" id="senha2" placeholder="Repita a senha" onkeydown="if(event.key==='Enter')cadastrar()">
  </div>

  <button class="btn" id="btn-cadastro" onclick="cadastrar()">Criar conta</button>
  <button class="btn btn-sec" onclick="window.location.href='login.html'">Já tenho conta</button>

  <div class="error" id="error-msg"></div>
  <div class="success" id="success-msg"></div>

  <div class="footer">Secretaria Municipal da Saúde</div>
</div>

<script>
const SUPABASE_URL = "https://djtwoesmgeetnrztyvzw.supabase.co";
const SUPABASE_KEY = "sb_publishable_62rlfRwV8Lzg_kFLJCEn4g_heoU6pqk";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

async function cadastrar(){
  const nome=document.getElementById("nome").value.trim();
  const email=document.getElementById("email").value.trim();
  const senha=document.getElementById("senha").value;
  const senha2=document.getElementById("senha2").value;
  const btn=document.getElementById("btn-cadastro");
  const err=document.getElementById("error-msg");
  const suc=document.getElementById("success-msg");

  err.style.display="none";
  suc.style.display="none";

  if(!nome||!email||!senha||!senha2){
    err.textContent="Preencha todos os campos.";err.style.display="block";return;
  }
  if(senha.length<6){
    err.textContent="A senha deve ter pelo menos 6 caracteres.";err.style.display="block";return;
  }
  if(senha!==senha2){
    err.textContent="As senhas não conferem.";err.style.display="block";return;
  }

  btn.disabled=true;btn.textContent="Criando conta...";

  const {data,error}=await sb.auth.signUp({email,password:senha});

  if(error){
    err.textContent=error.message==="User already registered"?"Este e-mail já está cadastrado.":error.message;
    err.style.display="block";
    btn.disabled=false;btn.textContent="Criar conta";
    return;
  }

  // Criar perfil como visualizador
  if(data.user){
    const {error:profileError}=await sb.from("profiles").insert({
      id: data.user.id,
      nome: nome,
      email: email,
      papel: "visualizador"
    });
    if(profileError){
      console.error("Erro ao criar perfil:", profileError);
    }
  }

  suc.textContent="✓ Conta criada! Redirecionando para o login...";
  suc.style.display="block";
  btn.disabled=false;btn.textContent="Criar conta";
  setTimeout(()=>window.location.href="login.html",2000);
}
</script>
</body>
</html>
