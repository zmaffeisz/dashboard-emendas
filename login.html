<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Secretaria da Saúde · Sorocaba</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f3;--surface:#fff;--text:#1a1a18;--text2:#5f5e5a;--text3:#9b9a96;--accent:#378ADD;--border:#e0ddd5;--input-bg:#fff;--shadow:rgba(0,0,0,.08);--sec-bg:#f0efea;--sec-hover:#e0ddd5;--info-bg:#f5f5f3}
html[data-theme="dark"]{--bg:#0f141c;--surface:#15202e;--text:#e6edf5;--text2:#c3ccd8;--text3:#8b97a8;--accent:#5eb3f5;--border:#243040;--input-bg:#0f141c;--shadow:rgba(0,0,0,.35);--sec-bg:#1c2533;--sec-hover:#243040;--info-bg:#1b2533}
html{transition:background .2s}
.tema-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:18px;cursor:pointer;line-height:1}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 24px var(--shadow)}
.logo{text-align:center;margin-bottom:2rem}
.logo-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.logo-sub{font-size:13px;color:var(--text3)}
.form-group{margin-bottom:1rem}
.form-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.form-input{width:100%;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;font-size:14px;font-weight:500;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;margin-top:.5rem;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:13px;color:#E24B4A;background:#FCEBEB;border-radius:6px;padding:8px 12px;margin-top:.75rem;display:none}
.footer{text-align:center;font-size:12px;color:var(--text3);margin-top:1.5rem}
</style>
</head>
<body>
<button id="tema-btn" onclick="alternarTema()" class="tema-btn" aria-label="Alternar tema">🌙</button>
<div class="card">
  <div class="logo">
    <div style="font-size:34px;line-height:1;margin-bottom:.5rem">🏥</div>
    <div class="logo-title">Secretaria da Saúde · Sorocaba</div>
    <div class="logo-sub">Sistema de Gestão — SUEQ</div>
  </div>
  <div class="form-group">
    <label class="form-label">E-mail</label>
    <input type="email" class="form-input" id="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label class="form-label">Senha</label>
    <input type="password" class="form-input" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="btn-login" onclick="login()">Entrar</button>
  <div class="error" id="error-msg"></div>
  <div style="text-align:center;margin-top:.875rem">
    <a href="cadastro.html" style="font-size:13px;color:var(--accent);text-decoration:none">Não tem conta? Criar acesso</a>
  </div>
  <div class="footer">Secretaria Municipal da Saúde</div>
</div>

<script>
function aplicarTema(t){document.documentElement.dataset.theme=t;var b=document.getElementById('tema-btn');if(b)b.textContent=t==='dark'?'☀️':'🌙';try{localStorage.setItem('tema',t);}catch(e){}}
function alternarTema(){aplicarTema(document.documentElement.dataset.theme==='dark'?'light':'dark');}
aplicarTema((function(){try{return localStorage.getItem('tema');}catch(e){return null;}})()||'light');
</script>
<script>
const SUPABASE_URL = "https://djtwoesmgeetnrztyvzw.supabase.co";
const SUPABASE_KEY = "sb_publishable_62rlfRwV8Lzg_kFLJCEn4g_heoU6pqk";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
  const email=document.getElementById("email").value.trim();
  const senha=document.getElementById("senha").value;
  const btn=document.getElementById("btn-login");
  const err=document.getElementById("error-msg");
  if(!email||!senha){err.textContent="Preencha e-mail e senha.";err.style.display="block";return}
  btn.disabled=true;btn.textContent="Entrando...";err.style.display="none";
  const {data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){
    err.textContent=error.message==="Invalid login credentials"?"E-mail ou senha incorretos.":error.message;
    err.style.display="block";
    btn.disabled=false;btn.textContent="Entrar";
    return;
  }
  // Redirecionar para o dashboard
  window.location.href="index.html";
}

// Se já está logado, redireciona direto
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href="index.html";
});
</script>
</body>
</html>
